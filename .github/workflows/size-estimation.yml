name: Branch Size Estimation

on:
  workflow_dispatch:

jobs:
  calc:
    runs-on: "himmel"
    steps:
      - name: Compare branch sizes
        env:
          HOME: /Users/himmel
        run: |
          branches=(main jp/basic jp/movie jp/sound jp/unsupported)
          cd /Users/himmel/gd-offline-res || exit 1
          
          for branch in "${branches[@]}"; do
            echo "[$] Checking out $branch..."
            git checkout "refs/heads/$branch" >/dev/null 2>&1 || {
              echo "Failed to checkout $branch"
              continue
            }

            echo "[%] Calculating Size for $branch"

            total=$(du -sb "$TARGET" | awk '{print $1}')
            gitdir=$(du -sb "$TARGET/.git" 2>/dev/null | awk '{print $1}')
            if [ -z "$gitdir" ]; then gitdir=0; fi

            diff_bytes=$(( total - gitdir ))
            diff_gb=$(echo "scale=2; $diff_bytes/1024/1024/1024" | bc)
            echo "[%] $branch: ${diff_gb} GB"
          done
