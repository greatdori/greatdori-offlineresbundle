name: Debug

on:
  workflow_dispatch:

jobs:
  build:
    if: false
    name: Build OfflineResBundleGen
    runs-on: "himmel"
    steps:
      - name: Checkout Greatdori!
        uses: actions/checkout@v5
        with:
          repository: "Greatdori/DoriKit"
          ref: main
      - name: Update submodules
        run: git submodule update --init --recursive
      - name: Prepare build directory
        run: mkdir build
      - name: Build OfflineResBundleGen
        run: xcodebuild -project ./DoriKit.xcodeproj -scheme OfflineResBundleGen -configuration Release -derivedDataPath ./build build
      - name: Write Build Result
        run: |
        # cp /Users/himmel/gd-offline-res-runner/_work/Greatdori-OfflineResBundle/Greatdori-OfflineResBundle/build/Build/Products/Release/OfflineResBundleGen $(pwd -P)/build/Build/Products/Release
  update:
    name: Update Resources
    runs-on: "himmel"
    needs: build
    if: ${{ always() }}
    permissions:
      contents: write
    steps:
      - name: Set OfflineResBundleGen path
        id: orbg
        run: echo "path=$(pwd -P)/build/Build/Products/Release/OfflineResBundleGen" >> "$GITHUB_OUTPUT"
      - name: Start Debug Script
        env:
          HOME: /Users/himmel
        run: |
          "${{ steps.orbg.outputs.path }}" --debug -o /Users/himmel/gd-offline-res -t ${{ secrets.GITHUB_TOKEN }} -l 8552
